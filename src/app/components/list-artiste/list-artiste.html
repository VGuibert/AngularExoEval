<section>
    <ul>    
    @for(artiste of listOfArtist(); track $index){
        <li class="list-artiste">
            <a class="card-artiste" [routerLink]="['/details', artiste.id]">
                <img src='{{artiste.image}}' alt="image"/>
                <p class="card-artiste-name">{{artiste.name}}</p>
                <p class="card-artiste-genre">{{artiste.genre}}</p>
            </a>
        </li>
    }
    </ul>
</section>
